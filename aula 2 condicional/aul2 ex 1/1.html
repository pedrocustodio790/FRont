<!DOCTYPE html> <!-- Declaração do tipo de documento HTML -->
<html lang="pt-BR"> <!-- Define o idioma da página como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
  <title>Verificar Número</title> <!-- Título da página exibido na aba do navegador -->
</head>
<body>
  <h2>Verificar se o número é positivo, negativo ou zero</h2> <!-- Cabeçalho da seção -->
  <input type="number" id="valor" placeholder="Digite um número"> <!-- Campo de entrada para o número -->
  <button onclick="verificarNumero()">Verificar</button> <!-- Botão que chama a função verificarNumero quando clicado -->
  <p id="resultado"></p> <!-- Parágrafo onde o resultado será exibido -->
