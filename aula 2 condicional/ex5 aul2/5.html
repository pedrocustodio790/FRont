<!DOCTYPE html> <!-- Declaração do tipo de documento HTML -->
<html lang="pt-BR"> <!-- Define o idioma da página como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
  <title>Classificação da Nota</title> <!-- Título da página exibido na aba do navegador -->
</head>
<body>
  <h2>Classificação de nota</h2> <!-- Cabeçalho da seção -->
  <input type="number" id="nota" placeholder="Nota de 0 a 10" step="0.1"> <!-- Campo de entrada para a nota, permitindo casas decimais -->
  <button onclick="classificarNota()">Classificar</button> <!-- Botão que chama a função classificarNota quando clicado -->
  <p id="resultado"></p> <!-- Parágrafo onde o resultado da classificação da nota será exibido -->
</body>
</html>
