<!DOCTYPE html> <!-- Declaração do tipo de documento HTML -->
<html lang="pt-BR"> <!-- Define o idioma da página como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
  <title>Verificar Palíndromo</title> <!-- Título da página exibido na aba do navegador -->
</head>
<body>
  <h2>Verifique se a palavra é um palíndromo</h2> <!-- Cabeçalho da seção -->
  <input type="text" id="palavra" placeholder="Digite uma palavra"> <!-- Campo de entrada para a palavra a ser verificada -->
  <button onclick="verificarPalindromo()">Verificar</button> <!-- Botão que chama a função verificarPalindromo quando clicado -->
</body>
</html>
