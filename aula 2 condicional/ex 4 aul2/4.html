<!DOCTYPE html> <!-- Declaração do tipo de documento HTML -->
<html lang="pt-BR"> <!-- Define o idioma da página como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
  <title>Classificação do Triângulo</title> <!-- Título da página exibido na aba do navegador -->
</head>
<body>
  <h2>Classifique um triângulo</h2> <!-- Cabeçalho da seção -->
  <input type="number" id="lado1" placeholder="Lado 1"> <!-- Campo de entrada para o primeiro lado do triângulo -->
  <input type="number" id="lado2" placeholder="Lado 2"> <!-- Campo de entrada para o segundo lado do triângulo -->
  <input type="number" id="lado3" placeholder="Lado 3"> <!-- Campo de entrada para o terceiro lado do triângulo -->
  <button onclick="classificar()">Classificar</button> <!-- Botão que chama a função classificar quando clicado -->
  <p id="resultado"></p> <!-- Parágrafo onde o resultado da classificação do triângulo será exibido -->
</body>
</html>
