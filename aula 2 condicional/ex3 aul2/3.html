<!DOCTYPE html> <!-- Declaração do tipo de documento HTML -->
<html lang="pt-BR"> <!-- Define o idioma da página como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
  <title>Ano Bissexto</title> <!-- Título da página exibido na aba do navegador -->
</head>
<body>
  <h2>Verificar se o ano é bissexto</h2> <!-- Cabeçalho da seção -->
  <input type="number" id="ano" placeholder="Digite o ano"> <!-- Campo de entrada para o ano -->
  <button onclick="verificarBissexto()">Verificar</button> <!-- Botão que chama a função verificarBissexto quando clicado -->
  <p id="resposta"></p> <!-- Parágrafo onde a resposta sobre o ano bissexto será exibida -->
</body>
</html>
