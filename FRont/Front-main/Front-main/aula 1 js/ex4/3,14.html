<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="ex4.js" defer></script>
    <title>Área do Círculo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .input-group {
            margin: 20px 0;
        }
        label {
            display: inline-block;
            width: 100px;
            text-align: right;
            margin-right: 10px;
        }
        input {
            padding: 8px;
            width: 100px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .formula {
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Calculadora de Área do Círculo</h1>
    <p class="formula">Área = π × r²</p>
    
    <div class="input-group">
        <label for="raio">Raio (r):</label>
        <input type="number" id="raio" placeholder="Digite o raio">
    </div>
    
    <button onclick="calcularArea()">Calcular Área</button>
    
    <div id="resultado"></div>
</body>
</html>
