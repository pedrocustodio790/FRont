<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="ex2.js" defer></script>
    <title>Área do Trapézio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .input-group {
            margin: 15px 0;
        }
        label {
            display: inline-block;
            width: 120px;
            text-align: right;
            margin-right: 10px;
        }
        input {
            padding: 8px;
            width: 100px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Calculadora de Área do Trapézio</h1>
    <p>Preencha os valores abaixo:</p>
    
    <div class="input-group">
        <label for="baseMaior">Base Maior (B):</label>
        <input type="number" id="baseMaior" placeholder="B">
    </div>
    
    <div class="input-group">
        <label for="baseMenor">Base Menor (b):</label>
        <input type="number" id="baseMenor" placeholder="b">
    </div>
    
    <div class="input-group">
        <label for="altura">Altura (h):</label>
        <input type="number" id="altura" placeholder="h">
    </div>
    
    <button onclick="calcularArea()">Calcular Área</button>
    
    <div id="resultado"></div>
</body>
</html>
