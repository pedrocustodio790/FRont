<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body {
        font-family: 'Arial', sans-serif;
        background-color: #111;
        color: #fff;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        background-image: linear-gradient(to bottom, #222, #000);
        min-height: 100vh;
      }
      
      h1 {
        color: #ff3355; /* Vermelho Ramlethal */
        text-align: center;
        text-shadow: 0 0 10px rgba(255, 51, 85, 0.5);
        margin-bottom: 30px;
        font-size: 2.2em;
        border-bottom: 2px solid #ff3355;
        padding-bottom: 10px;
      }
      
      label {
        display: block;
        margin-bottom: 10px;
        color: #ccc;
        font-size: 1.1em;
      }
      
      input[type="text"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        background-color: #222;
        border: 1px solid #ff3355;
        color: white;
        font-size: 1em;
        border-radius: 4px;
        box-sizing: border-box;
      }
      
      input[type="text"]:focus {
        outline: none;
        border-color: #ff6688;
        box-shadow: 0 0 8px rgba(255, 51, 85, 0.6);
      }
      
      #btnContar {
        background-color: #ff3355;
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 1em;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.3s ease;
        display: block;
        margin: 0 auto;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: bold;
      }
      
      #btnContar:hover {
        background-color: #ff4466;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 51, 85, 0.4);
      }
      
      #btnContar:active {
        transform: translateY(0);
      }
      
      #resultado {
        margin-top: 20px;
        padding: 15px;
        background-color: #222;
        border-left: 4px solid #ff3355;
        color: #eee;
        font-size: 1.2em;
        text-align: center;
        border-radius: 0 4px 4px 0;
      }
      
      ::placeholder {
        color: #666;
        font-style: italic;
      }
    </style>
    <script src="deadtomorrow.js" defer></script>
  </head>
  <body>
    <h1>Right and wrong are not for sure The castle made of sand will fall</h1>
    <label for="inputString">Digite uma palavra ou frase:</label>
    <input type="text" id="inputString" placeholder="Digite aqui" />
    <button onclick="iniciar()"id="btnContar">Contar Vogais</button>
    <p id="resultado"></p>
  </body>
</html>
