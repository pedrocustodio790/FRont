<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - Restaurante</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Sistema de Pedidos</h1>
        
        <div class="card mb-4">
            <div class="card-header">
                <h5>Cardápio</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-5">
                        <select id="itemSelect" class="form-select">
                            <option value="">Selecione um item</option>
                            <option value="1">Hambúrguer Clássico - R$ 25,00</option>
                            <option value="2">Pizza Margherita - R$ 45,00</option>
                            <option value="3">Salada Caesar - R$ 18,00</option>
                            <option value="4">Refrigerante - R$ 8,00</option>
                            <option value="5">Sobremesa - R$ 12,00</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="quantidade" class="form-control" placeholder="Quantidade" min="1" value="1">
                    </div>
                    <div class="col-md-4">
                        <button id="adicionarItem" class="btn btn-primary w-100">Adicionar ao Pedido</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Pedido Atual</h5>
                <div>
                    <span class="badge bg-success fs-6">
                        Total: R$ <span id="totalPedido">0.00</span>
                    </span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Quantidade</th>
                                <th>Preço Unit.</th>
                                <th>Subtotal</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="itensPedido">
                            <!-- Itens serão adicionados aqui via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2">
            <button id="finalizarPedido" class="btn btn-success btn-lg">Finalizar Pedido</button>
        </div>

        <div id="historicoPedidos" class="mt-5">
            <h3>Histórico de Pedidos</h3>
            <div id="listaPedidos" class="list-group">
                <!-- Pedidos finalizados aparecerão aqui -->
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div class="modal fade" id="confirmacaoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Deseja finalizar este pedido?</p>
                    <p><strong>Total: R$ <span id="modalTotal">0.00</span></strong></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="confirmarPedido" class="btn btn-primary">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="ItemPedido.js"></script>
    <script src="Pedido.js"></script>
    <script src="app.js"></script>
</body>
</html>
