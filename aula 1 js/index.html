<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antecessor e Sucessor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        input, button {
            padding: 8px;
            margin: 10px 0;
            font-size: 16px;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Antecessor e Sucessor</h1>
    <p>Digite um número inteiro:</p>
    
    <input type="number" id="numeroInput" placeholder="Digite um número">
    <button onclick="calcular()">Calcular</button>
    
    <div id="resultado"></div>

    <script>
        function calcular() {
            // Pegar o valor do input
            const numero = parseInt(document.getElementById("numeroInput").value);
            
            // Verificar se é um número válido
            if (isNaN(numero)) {
                document.getElementById("resultado").innerHTML = "Por favor, digite um número válido.";
                return;
            }
            
            // Calcular antecessor e sucessor
            const antecessor = numero - 1;
            const sucessor = numero + 1;
            
            // Mostrar o resultado
            document.getElementById("resultado").innerHTML = 
                `Número digitado: ${numero}<br>
                 Antecessor: ${antecessor}<br>
                 Sucessor: ${sucessor}`;
        }
    </script>
</body>
</html>
