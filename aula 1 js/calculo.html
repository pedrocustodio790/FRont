<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Trapézio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .input-group {
            margin: 15px 0;
        }
        label {
            display: inline-block;
            width: 120px;
            text-align: right;
            margin-right: 10px;
        }
        input {
            padding: 8px;
            width: 100px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Calculadora de Área do Trapézio</h1>
    <p>Preencha os valores abaixo:</p>
    
    <div class="input-group">
        <label for="baseMaior">Base Maior (B):</label>
        <input type="number" id="baseMaior" placeholder="B">
    </div>
    
    <div class="input-group">
        <label for="baseMenor">Base Menor (b):</label>
        <input type="number" id="baseMenor" placeholder="b">
    </div>
    
    <div class="input-group">
        <label for="altura">Altura (h):</label>
        <input type="number" id="altura" placeholder="h">
    </div>
    
    <button onclick="calcularArea()">Calcular Área</button>
    
    <div id="resultado"></div>

    <script>
        function calcularArea() {
            // Pegar os valores dos inputs
            const baseMaior = parseFloat(document.getElementById("baseMaior").value);
            const baseMenor = parseFloat(document.getElementById("baseMenor").value);
            const altura = parseFloat(document.getElementById("altura").value);
            
            // Verificar se todos os valores são números válidos
            if (isNaN(baseMaior) || isNaN(baseMenor) || isNaN(altura)) {
                document.getElementById("resultado").innerHTML = "Por favor, digite valores válidos para todas as medidas.";
                return;
            }
            
            // Verificar se os valores são positivos
            if (baseMaior <= 0 || baseMenor <= 0 || altura <= 0) {
                document.getElementById("resultado").innerHTML = "Todos os valores devem ser positivos.";
                return;
            }
            
            // Verificar se a base maior é realmente maior que a base menor
            if (baseMaior < baseMenor) {
                document.getElementById("resultado").innerHTML = "A base maior deve ser maior que a base menor.";
                return;
            }
            
            // Calcular a área do trapézio
            const area = ((baseMaior + baseMenor) * altura) / 2;
            
            // Mostrar o resultado com 2 casas decimais
            document.getElementById("resultado").innerHTML = 
                `Área do Trapézio = (B + b) × h / 2<br>
                 = (${baseMaior} + ${baseMenor}) × ${altura} / 2<br>
                 = ${area.toFixed(2)}`;
        }
    </script>
</body>
</html>
