<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Círculo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .input-group {
            margin: 20px 0;
        }
        label {
            display: inline-block;
            width: 100px;
            text-align: right;
            margin-right: 10px;
        }
        input {
            padding: 8px;
            width: 100px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .formula {
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Calculadora de Área do Círculo</h1>
    <p class="formula">Área = π × r²</p>
    
    <div class="input-group">
        <label for="raio">Raio (r):</label>
        <input type="number" id="raio" placeholder="Digite o raio">
    </div>
    
    <button onclick="calcularArea()">Calcular Área</button>
    
    <div id="resultado"></div>

    <script>
        function calcularArea() {
            // Pegar o valor do raio do input
            const raio = parseFloat(document.getElementById("raio").value);
            
            // Verificar se é um número válido
            if (isNaN(raio)) {
                document.getElementById("resultado").innerHTML = "Por favor, digite um valor numérico válido para o raio.";
                return;
            }
            
            // Verificar se o raio é positivo
            if (raio <= 0) {
                document.getElementById("resultado").innerHTML = "O raio deve ser um valor positivo maior que zero.";
                return;
            }
            
            // Calcular a área do círculo (π × r²)
            const area = Math.PI * Math.pow(raio, 2);
            
            // Mostrar o resultado com 2 casas decimais
            document.getElementById("resultado").innerHTML = 
                `Para um círculo com raio r = ${raio.toFixed(2)}:<br><br>
                 Área = π × r²<br>
                 = ${Math.PI.toFixed(5)} × ${raio.toFixed(2)}²<br>
                 = ${area.toFixed(2)}`;
        }
    </script>
</body>
</html>
